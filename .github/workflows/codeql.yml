name: 'CodeQL Security Scanning'

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '30 1 * * 1' # Weekly on Mondays at 1:30 AM UTC

jobs:
  yarn:
    name: Check lockfile consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v5
        with:
          path: |
            .yarn/cache
            .yarn/unplugged
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Verify Yarn version
        run: |
          yarn --version
          echo "Expected: 4.13.0"
          if [ "$(yarn --version)" != "4.13.0" ]; then
            echo "ERROR: Yarn version mismatch!"
            exit 1
          fi

      # Verify lockfile is up-to-date
      - name: Check yarn.lock consistency
        run: |
          echo "Running immutable install to verify yarn.lock..."
          if ! yarn install --immutable --immutable-cache; then
            echo "::error::yarn.lock is out of sync with package.json. Run 'yarn install' locally and commit the updated yarn.lock"
            exit 1
          fi

      # Run typecheck to catch type errors early
      - name: Type check
        run: yarn typecheck

  analyze:
    name: Analyze Code
    needs: yarn
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: true
      matrix:
        include:
          - language: javascript-typescript
            build-mode: autobuild

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          queries: +security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{matrix.language}}'
