name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # ensure the project builds correctly for the same Node.js
    # version as used in production
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Verify Yarn version
        run: |
          yarn --version
          echo "Expected: 4.13.0"
          if [ "$(yarn --version)" != "4.13.0" ]; then
            echo "ERROR: Yarn version mismatch!"
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run type checking
        run: yarn typecheck

      - name: Build site
        run: yarn build
        env:
          NODE_ENV: production

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Verify Yarn version
        run: |
          yarn --version
          echo "Expected: 4.13.0"
          if [ "$(yarn --version)" != "4.13.0" ]; then
            echo "ERROR: Yarn version mismatch!"
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check Prettier formatting
        run: |
          if command -v prettier &> /dev/null || [ -f "node_modules/.bin/prettier" ]; then
            echo "Checking code formatting with Prettier..."
            yarn dlx prettier --check "**/*.{js,jsx,ts,tsx,md,json,yml,yaml}" || {
              echo "❌ Code formatting issues found. Run 'yarn dlx prettier --write .' to fix."
              exit 1
            }
            echo "✅ All files are properly formatted"
          else
            echo "⚠️  Prettier not configured - skipping format check"
          fi

      - name: Run ESLint
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ] || [ -f "node_modules/.bin/eslint" ]; then
            echo "Running ESLint..."
            yarn dlx eslint . --ext .js,.jsx,.ts,.tsx || {
              echo "❌ ESLint issues found. Run 'yarn dlx eslint . --fix' to fix auto-fixable issues."
              exit 1
            }
            echo "✅ No ESLint issues found"
          else
            echo "⚠️  ESLint not configured - skipping lint check"
          fi

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Verify Yarn version
        run: |
          yarn --version
          echo "Expected: 4.13.0"
          if [ "$(yarn --version)" != "4.13.0" ]; then
            echo "ERROR: Yarn version mismatch!"
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run security audit on production dependencies
        run: |
          echo "Running security audit on production dependencies..."
          echo "⚠️  Only production dependencies will cause failures."
          echo ""

          # Check production dependencies only (fail on moderate+)
          if npm audit --production --audit-level moderate; then
            echo "✅ No vulnerabilities in production dependencies"
          else
            echo "❌ Found vulnerabilities in production dependencies"
            exit 1
          fi

          echo ""
          echo "Checking all dependencies for informational purposes..."
          npm audit --audit-level moderate || echo "⚠️  Found vulnerabilities in dev dependencies (non-blocking)"
